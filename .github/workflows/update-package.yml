name: "Update packages"

on:
  workflow_dispatch:
    inputs:
      build:
        description: "Build package before opening PR"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  list-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: List packages
        id: packages
        run: |
          set -euo pipefail

          packages="$(nix eval --json .#packages.x86_64-linux --apply builtins.attrNames)"
          echo "packages=$packages" >> "$GITHUB_OUTPUT"

  update:
    name: "Update ${{ matrix.package }}"
    needs: list-packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        package: ${{ fromJson(needs.list-packages.outputs.packages) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update package
        id: update
        env:
          PACKAGE: ${{ matrix.package }}
          BUILD: ${{ inputs.build }}
        run: |
          set -euo pipefail

          args=(--flake "$PACKAGE" --use-update-script --use-github-releases)
          if [ "$BUILD" = "true" ]; then
            args+=(--build)
          fi

          nix shell nixpkgs#nix-update -c nix-update "${args[@]}"

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(nix eval --raw ".#packages.x86_64-linux.${PACKAGE}.version")"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create pull request for ${{ matrix.package }} to ${{ steps.update.outputs.version }}
        id: create-pr
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.UPDATE_BOT_TOKEN }}
          branch: update/${{ matrix.package }}
          delete-branch: true
          title: "Update ${{ matrix.package }} to ${{ steps.update.outputs.version }}"
          commit-message: "Update ${{ matrix.package }} to ${{ steps.update.outputs.version }}"
          body: |
            Automated package update generated with `nix-update`.

            Package: `${{ matrix.package }}`
            Version: `${{ steps.update.outputs.version }}`
            Build before PR: `${{ inputs.build }}`

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.UPDATE_BOT_TOKEN }}
        run: gh pr merge "${{ steps.create-pr.outputs.pull-request-number }}" --auto --squash --delete-branch
